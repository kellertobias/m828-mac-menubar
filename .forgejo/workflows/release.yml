name: Release

# Forgejo owns versioning only — it never builds the macOS app (no macOS runners
# required here). On a push to main it derives the next version from Conventional
# Commits, bumps VERSION, commits, and creates and pushes the annotated v* tag.
# The GitHub push mirror reacts to that tag to build and publish the app
# (see .github/workflows/release.yml).

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine next version from Conventional Commits
        id: version
        run: echo "value=$(node Scripts/next-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Tag and push the release
        if: steps.version.outputs.value != ''
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git config user.name "Forgejo CI"
          git config user.email "ci@tokenet.de"
          node Scripts/set-version.mjs "$VERSION"
          git add VERSION
          # No [skip ci] marker: the v* tag points at this commit, and GitHub Actions
          # honors [skip ci] on a tag's target commit, which would skip the mirrored
          # tag build. Re-triggering this job on the release commit is a harmless no-op
          # because next-version.mjs finds no commits since the freshly-created tag.
          git commit -m "chore(release): v$VERSION"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin HEAD:main
          git push origin "v$VERSION"

      - name: Report no release
        if: steps.version.outputs.value == ''
        run: echo "No release-worthy commits since the last tag."
