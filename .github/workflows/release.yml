name: Release

# The canonical repository lives on Forgejo, which owns versioning and pushes the v*
# tag (see .forgejo/workflows/release.yml). That tag is push-mirrored to GitHub and
# triggers this workflow. It builds the app as a universal binary (Apple Silicon +
# Intel) and, only if the build succeeds, publishes a GitHub Release. A macOS runner is
# required because the app links AppKit, which is unavailable outside the macOS SDK;
# GitHub-hosted macOS runners need no self-managed infrastructure. The app is unsigned
# (no Apple Developer account).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15 # GitHub-hosted Apple Silicon (arm64) with Xcode 16 / Swift 6
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode (Package.swift needs Swift 6 tools)
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version

      - name: Build and package the app (universal arm64 + x86_64)
        env:
          MACOS_UNIVERSAL: "1"
        run: ./build archive

      - name: Verify universal binary
        run: lipo -archs ".build/Menubar Native Control.app/Contents/MacOS/MenubarNativeControl"

      - name: Create distributable archive
        id: package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          APP_NAME="Menubar Native Control"
          APP_PATH=".build/$APP_NAME.app"
          ZIP_NAME="Menubar-Native-Control-${VERSION}-macos-universal.zip"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256"
          echo "zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## Menubar Native Control ${TAG}"
            echo
            echo "Universal macOS menubar app (Apple Silicon + Intel). **Unsigned** — no Apple Developer account."
            echo
            echo "### Install"
            echo "1. Download and unzip \`${{ steps.package.outputs.zip }}\`."
            echo "2. Move **Menubar Native Control.app** to /Applications."
            echo "3. Remove the quarantine flag so Gatekeeper allows it to launch:"
            echo '   ```sh'
            echo '   xattr -dr com.apple.quarantine "/Applications/Menubar Native Control.app"'
            echo '   ```'
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "**Full changelog:** https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            fi
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ZIP: ${{ steps.package.outputs.zip }}
        run: |
          set -euo pipefail
          # Idempotent: a re-run of the tag build updates the existing release and
          # its assets instead of failing because the release already exists.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" "$ZIP" "$ZIP.sha256" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              "$ZIP" "$ZIP.sha256"
          fi
